# Dismiss stale pull request approvals
#
# Reusable workflow that dismisses PR approvals when the diff changes.
# Uses OIDC token to resolve the correct checkout ref for the action.
#
# TODO: Replace OIDC workaround with $/ syntax once available
# see: https://github.com/orgs/community/discussions/26245#discussioncomment-15601440
name: Stale approvals

on:
  pull_request:
    paths:
      - ".github/workflows/preflight-stale-approvals.yml"
      - ".github/actions/dismiss-stale-approvals/**"
  pull_request_target:
  merge_group:
  workflow_call:

permissions:
  actions: read
  contents: read
  # Required to extract job_workflow_ref from the OIDC token, which contains
  # the ref this reusable workflow was called with. This is the only reliable
  # way to resolve the correct checkout ref for the composite action.
  # see: https://github.com/actions/toolkit/issues/1264
  id-token: write
  pull-requests: write

jobs:
  approval-freshness:
    name: Approval freshness
    runs-on: ubuntu-24.04
    if: github.event_name == 'merge_group'
    steps:
      - name: Resolve reusable workflow ref
        id: workflow-ref
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const token = await core.getIDToken();
            const [, payload] = token.split('.');
            const { job_workflow_ref } = JSON.parse(Buffer.from(payload, 'base64url'));
            const ref = job_workflow_ref.split('@')[1];
            core.setOutput('ref', ref);

      - name: Checkout action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: hashintel/.github
          ref: ${{ steps.workflow-ref.outputs.ref }}
          sparse-checkout: |
            .github/actions/dismiss-stale-approvals

      - name: Check approval freshness for all PRs in merge group
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_GROUP_HEAD_SHA: ${{ github.event.merge_group.head_sha }}
          MERGE_GROUP_BASE_SHA: ${{ github.event.merge_group.base_sha }}
        run: |
          # Find all PRs that are part of this merge group by examining commits
          # between the base and head of the merge group
          pr_numbers=$(gh api "/repos/${{ github.repository }}/compare/${MERGE_GROUP_BASE_SHA}...${MERGE_GROUP_HEAD_SHA}" \
            --jq '[.commits[].commit.message | capture("Merge pull request #(?<num>[0-9]+)") | .num] | unique | .[]' 2>/dev/null || true)

          # Fallback: extract PR number from head_ref if no merge commits found
          if [[ -z "$pr_numbers" ]]; then
            head_ref="${{ github.event.merge_group.head_ref }}"
            if [[ "$head_ref" =~ pr-([0-9]+)- ]]; then
              pr_numbers="${BASH_REMATCH[1]}"
            else
              echo "::error::Could not identify PRs in merge group"
              exit 1
            fi
          fi

          echo "PRs in merge group: $pr_numbers"

          failed=0
          for pr_number in $pr_numbers; do
            echo "Checking PR #$pr_number..."

            pr_head_sha=$(gh api "/repos/${{ github.repository }}/pulls/$pr_number" --jq '.head.sha')

            approval_sha=$(.github/actions/dismiss-stale-approvals/latest-approval-sha.sh "${{ github.repository }}" "$pr_number")

            if [[ -z "$approval_sha" ]]; then
              echo "::error::PR #$pr_number has no approvals"
              failed=1
              continue
            fi

            if [[ "$approval_sha" != "$pr_head_sha" ]]; then
              echo "::error::PR #$pr_number has stale approvals. Latest approval was on $approval_sha but PR head is $pr_head_sha"
              failed=1
              continue
            fi

            echo "PR #$pr_number: approvals are fresh (approved at $approval_sha)"
          done

          if [[ $failed -eq 1 ]]; then
            exit 1
          fi

          echo "All PRs in merge group have fresh approvals"

  dismiss:
    name: Dismiss
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
    steps:
      - name: Resolve reusable workflow ref
        id: workflow-ref
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const token = await core.getIDToken();
            const [, payload] = token.split('.');
            const { job_workflow_ref } = JSON.parse(Buffer.from(payload, 'base64url'));
            const ref = job_workflow_ref.split('@')[1];
            core.setOutput('ref', ref);

      - name: Checkout action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: hashintel/.github
          ref: ${{ steps.workflow-ref.outputs.ref }}
          sparse-checkout: |
            .github/actions/dismiss-stale-approvals

      - name: Run self-test
        run: .github/actions/dismiss-stale-approvals/self-test.sh

      - name: Dismiss stale pull request approvals
        uses: ./.github/actions/dismiss-stale-approvals
        with:
          dry-run: ${{ github.event_name == 'pull_request' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
