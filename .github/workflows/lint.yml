name: Lint

on:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  renovate:
    name: Validate renovate config
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate renovate config
        run: |
          version=$(jq -r '.devDependencies.renovate' package.json)
          npm install --global "renovate@$version"
          # Without arguments the validator only checks this repo's own config
          # (`renovate.json`). The shared preset `renovate-config.json`, which
          # other repos extend via `github>hashintel/.github:renovate-config`,
          # is not a default config file name and must be validated explicitly.
          if ! renovate-config-validator || ! renovate-config-validator renovate-config.json; then
            echo ''
            echo ''
            echo 'ℹ️ ℹ️ ℹ️'
            echo 'Please fix the above errors locally for the check to pass.'
            echo 'If you don’t see them, try merging target branch into yours.'
            echo 'ℹ️ ℹ️ ℹ️'
            exit 1
          fi
