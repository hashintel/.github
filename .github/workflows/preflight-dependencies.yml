# Dependency Review Action
#
# This Action will scan dependency manifest files that change as part of a Pull Request,
# surfacing known-vulnerable versions of the packages declared or updated in the PR.
# Once installed, if the workflow run is marked as required, PRs introducing
# known-vulnerable packages will be blocked from merging.
#
# Source repository: https://github.com/actions/dependency-review-action
# Public documentation: https://docs.github.com/en/code-security/supply-chain-security/understanding-your-software-supply-chain/about-dependency-review#dependency-review-enforcement
name: Dependencies

on:
  pull_request:
    paths:
      - ".github/workflows/preflight-dependencies.yml"
  pull_request_target:
  merge_group:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review
    # dependency-review-action requires GitHub Advanced Security on private repos
    # TODO(SRE-620): Remove once GHAS is enabled for private repos
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          comment-summary-in-pr: on-failure
          show-patched-versions: true
